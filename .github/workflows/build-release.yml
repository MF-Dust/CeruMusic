name: Build Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create or upload assets for
        required: true
      release_name:
        description: Optional release name

permissions:
  contents: write

concurrency:
  group: release-assets-${{ github.event.release.tag_name || inputs.tag_name }}
  cancel-in-progress: false

jobs:
  release-info:
    name: Resolve release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      release_name: ${{ steps.release.outputs.release_name }}
    steps:
      - name: Resolve release metadata
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_ID: ${{ github.event.release.id }}
          RELEASE_NAME: ${{ github.event.release.name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "release" ]; then
            tag_name="$RELEASE_TAG_NAME"
            release_id="$RELEASE_ID"
            release_name="$RELEASE_NAME"
          else
            tag_name="$INPUT_TAG_NAME"
            release_id=""
            release_name="${INPUT_RELEASE_NAME:-$INPUT_TAG_NAME}"
          fi

          {
            echo "tag_name=$tag_name"
            echo "release_id=$release_id"
            echo "release_name=$release_name"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build Windows
    needs: release-info
    runs-on: windows-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload Tauri bundles
        if: github.event_name == 'release'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.release-info.outputs.release_id }}
          tauriScript: pnpm tauri:build
          includeUpdaterJson: false
          retryAttempts: 3

      - name: Build and create release assets
        if: github.event_name != 'release'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.release-info.outputs.tag_name }}
          releaseName: ${{ needs.release-info.outputs.release_name }}
          releaseCommitish: ${{ github.sha }}
          tauriScript: pnpm tauri:build
          includeUpdaterJson: false
          retryAttempts: 3
